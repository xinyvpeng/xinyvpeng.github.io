name: Deploy Hexo to GitHub Pages

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create .env for Gitalk secret
        run: |
          if [ -n "${{ secrets.GITALK_CLIENT_SECRET }}" ]; then
            echo "GITALK_CLIENT_SECRET=${{ secrets.GITALK_CLIENT_SECRET }}" > .env
          fi

      - run: npx hexo generate

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: 'Site updated: ${{ github.event.head_commit.message }}'
