<!DOCTYPE html>
<html data-theme="day">
<head>
  <meta charset="UTF-8">
  <title>森林主题模块功能测试</title>
  <style>
    :root {
      --bg-day: #f8f9fa;
      --text-day: #212529;
      --bg-night: #121a0f;
      --text-night: #e8f1e1;
    }
    [data-theme="night"] {
      background: var(--bg-night);
      color: var(--text-night);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-day);
      color: var(--text-day);
      transition: background 0.3s, color 0.3s;
    }
    .test-section {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      background: rgba(255,255,255,0.7);
    }
    [data-theme="night"] .test-section {
      background: rgba(30,40,25,0.7);
      border-color: #444;
    }
    button {
      margin: 4px;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      opacity: 0.9;
    }
    #log {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 13px;
      margin-top: 16px;
    }
    [data-theme="night"] #log {
      background: #1a1a1a;
      border-color: #444;
      color: #ccc;
    }
    .log-entry {
      margin: 4px 0;
      padding: 4px;
      border-left: 3px solid #007bff;
    }
    .log-entry.success { border-left-color: #28a745; }
    .log-entry.error { border-left-color: #dc3545; }
    .log-entry.info { border-left-color: #17a2b8; }
    h2 { margin-top: 24px; }
    .status { 
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      margin-left: 8px;
    }
    .status.day { background: #ffc107; color: #212529; }
    .status.night { background: #343a40; color: white; }
  </style>
</head>
<body>
  <h1>🌲 森林主题模块功能测试</h1>
  <p>测试 <code>ForestTheme</code> 模块的完整功能，包括本地存储、UI控制、事件分发等。</p>
  
  <div class="test-section">
    <h2>主题状态 <span id="current-theme-status" class="status day">day</span></h2>
    <button id="toggle-theme">切换主题</button>
    <button id="set-day">设为日间模式</button>
    <button id="set-night">设为夜间模式</button>
    <button id="get-theme">获取当前主题</button>
    <button id="clear-storage">清除本地存储</button>
  </div>
  
  <div class="test-section">
    <h2>功能测试</h2>
    <button id="test-init">初始化模块</button>
    <button id="test-update-vars">更新CSS变量</button>
    <button id="test-reduced-motion">检查减少动画支持</button>
    <button id="test-event">触发自定义事件</button>
    <button id="test-button-ui">测试按钮UI更新</button>
  </div>
  
  <div class="test-section">
    <h2>测试日志</h2>
    <div id="log"></div>
    <button id="clear-log">清空日志</button>
  </div>
  
  <script>
    // 复制 ForestTheme 模块代码（简化版用于测试）
    const ForestTheme = {
      currentTheme: 'day',
      themes: {
        day: { name: 'day', icon: '☀️', label: '日间模式' },
        night: { name: 'night', icon: '🌙', label: '夜间模式' }
      },
      init() {
        this.loadUserPreference();
        this.setupThemeToggle();
        this.applyTheme(this.currentTheme);
        this.log('模块已初始化');
      },
      loadUserPreference() {
        const savedTheme = localStorage.getItem('forest-library-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        this.currentTheme = savedTheme || (prefersDark ? 'night' : 'day');
      },
      applyTheme(theme) {
        const root = document.documentElement;
        root.removeAttribute('data-theme');
        if (theme === 'night') root.setAttribute('data-theme', 'night');
        this.updateThemeVariables(theme);
        this.currentTheme = theme;
        localStorage.setItem('forest-library-theme', theme);
        this.dispatchThemeChange(theme);
      },
      updateThemeVariables(theme) {
        const root = document.documentElement;
        if (theme === 'night') {
          root.style.setProperty('--particle-opacity', '0.3');
        } else {
          root.style.setProperty('--particle-opacity', '0.6');
        }
      },
      setupThemeToggle() {
        let toggleBtn = document.getElementById('forest-theme-toggle');
        if (!toggleBtn) {
          toggleBtn = document.createElement('button');
          toggleBtn.id = 'forest-theme-toggle';
          toggleBtn.className = 'forest-theme-toggle';
          toggleBtn.setAttribute('aria-label', '切换主题');
          document.body.appendChild(toggleBtn);
        }
        this.updateToggleButton();
        toggleBtn.addEventListener('click', () => {
          const newTheme = this.currentTheme === 'day' ? 'night' : 'day';
          this.applyTheme(newTheme);
          this.updateToggleButton();
        });
      },
      updateToggleButton() {
        const toggleBtn = document.getElementById('forest-theme-toggle');
        if (!toggleBtn) return;
        const theme = this.themes[this.currentTheme];
        toggleBtn.textContent = theme.icon;
        toggleBtn.title = `切换到${theme.label}`;
        toggleBtn.setAttribute('aria-label', `当前为${theme.label}，点击切换`);
      },
      dispatchThemeChange(theme) {
        const event = new CustomEvent('forest-theme-change', {
          detail: { theme, timestamp: Date.now() }
        });
        window.dispatchEvent(event);
      },
      getCurrentTheme() {
        return this.currentTheme;
      },
      supportsReducedMotion() {
        return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      }
    };
    
    // 测试工具
    const log = document.getElementById('log');
    function addLog(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }
    
    // 更新状态显示
    function updateStatus() {
      const status = document.getElementById('current-theme-status');
      status.textContent = ForestTheme.currentTheme;
      status.className = `status ${ForestTheme.currentTheme}`;
    }
    
    // 事件监听
    window.addEventListener('forest-theme-change', (e) => {
      addLog(`主题变化事件: ${e.detail.theme} (时间戳: ${e.detail.timestamp})`, 'success');
      updateStatus();
    });
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      ForestTheme.init();
      updateStatus();
      addLog('页面加载完成，ForestTheme 已初始化', 'success');
      
      // 创建测试按钮（如果不存在）
      if (!document.getElementById('forest-theme-toggle')) {
        ForestTheme.setupThemeToggle();
      }
    });
    
    // 绑定按钮事件
    document.getElementById('toggle-theme').addEventListener('click', () => {
      const newTheme = ForestTheme.currentTheme === 'day' ? 'night' : 'day';
      ForestTheme.applyTheme(newTheme);
      addLog(`手动切换主题到: ${newTheme}`);
    });
    
    document.getElementById('set-day').addEventListener('click', () => {
      ForestTheme.applyTheme('day');
      addLog('强制设置为日间模式');
    });
    
    document.getElementById('set-night').addEventListener('click', () => {
      ForestTheme.applyTheme('night');
      addLog('强制设置为夜间模式');
    });
    
    document.getElementById('get-theme').addEventListener('click', () => {
      const theme = ForestTheme.getCurrentTheme();
      addLog(`当前主题: ${theme}`, 'info');
    });
    
    document.getElementById('clear-storage').addEventListener('click', () => {
      localStorage.removeItem('forest-library-theme');
      addLog('已清除本地存储中的主题偏好', 'info');
    });
    
    document.getElementById('test-init').addEventListener('click', () => {
      ForestTheme.init();
      addLog('重新初始化模块', 'info');
    });
    
    document.getElementById('test-update-vars').addEventListener('click', () => {
      ForestTheme.updateThemeVariables(ForestTheme.currentTheme);
      addLog(`更新CSS变量，当前粒子透明度: ${getComputedStyle(document.documentElement).getPropertyValue('--particle-opacity')}`, 'info');
    });
    
    document.getElementById('test-reduced-motion').addEventListener('click', () => {
      const supports = ForestTheme.supportsReducedMotion();
      addLog(`减少动画支持: ${supports ? '是' : '否'}`, 'info');
    });
    
    document.getElementById('test-event').addEventListener('click', () => {
      ForestTheme.dispatchThemeChange(ForestTheme.currentTheme);
      addLog('手动触发了主题变化事件', 'info');
    });
    
    document.getElementById('test-button-ui').addEventListener('click', () => {
      ForestTheme.updateToggleButton();
      const btn = document.getElementById('forest-theme-toggle');
      if (btn) {
        addLog(`按钮UI更新: 图标=${btn.textContent}, 标题=${btn.title}`, 'info');
      } else {
        addLog('未找到主题切换按钮', 'error');
      }
    });
    
    document.getElementById('clear-log').addEventListener('click', () => {
      log.innerHTML = '';
      addLog('日志已清空', 'info');
    });
    
    // 初始日志
    addLog('森林主题测试页面已加载');
    addLog(`本地存储中的主题偏好: ${localStorage.getItem('forest-library-theme') || '无'}`);
    addLog(`系统偏好暗色模式: ${window.matchMedia('(prefers-color-scheme: dark)').matches ? '是' : '否'}`);
  </script>
</body>
</html>
