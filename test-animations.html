<!DOCTYPE html>
<html>
<head>
  <title>森林主题动画测试</title>
  <style>
    body {
      font-family: sans-serif;
      background: #1c2516;
      color: #e8f1e1;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #f4d35e;
      border-bottom: 2px solid #3e6a23;
      padding-bottom: 10px;
    }
    .animation-demo {
      background: #26311d;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid #3e6a23;
    }
    .demo-box {
      width: 100px;
      height: 100px;
      margin: 20px;
      display: inline-block;
      border-radius: 4px;
      text-align: center;
      line-height: 100px;
      color: white;
      font-weight: bold;
    }
    
    /* 动画关键帧 */
    @keyframes leaf-fall {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(calc(100vh + 100px)) rotate(360deg);
        opacity: 0;
      }
    }
    
    @keyframes sunlight-glow {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.05);
      }
    }
    
    @keyframes ripple-effect {
      0% {
        transform: scale(0);
        opacity: 0.7;
      }
      100% {
        transform: scale(4);
        opacity: 0;
      }
    }
    
    @keyframes gentle-grow {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(1.05);
      }
    }
    
    @keyframes page-transition {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* 动画类 */
    .leaf-fall {
      animation: leaf-fall 15s linear infinite;
      animation-play-state: running;
    }
    
    .sunlight-glow {
      animation: sunlight-glow 4s ease-in-out infinite;
    }
    
    .ripple {
      animation: ripple-effect 0.6s ease-out;
    }
    
    .gentle-grow {
      animation: gentle-grow 0.2s ease-out;
      animation-fill-mode: forwards;
    }
    
    .page-transition {
      animation: page-transition 0.4s ease-out;
    }
    
    /* 按钮样式 */
    button {
      background: #3e6a23;
      color: #f4d35e;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin: 10px;
    }
    
    button:hover {
      background: #5a8c3a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌳 森林主题动画测试</h1>
    <p>验证所有5个动画关键帧定义是否正常工作。</p>
    
    <div class="animation-demo">
      <h2>1. 树叶飘落动画 (leaf-fall)</h2>
      <p>持续15秒的无限循环动画，模拟树叶飘落效果。</p>
      <div class="demo-box leaf-fall" style="background: linear-gradient(135deg, #2d5016, #5a8c3a);">
        树叶
      </div>
    </div>
    
    <div class="animation-demo">
      <h2>2. 阳光光斑动画 (sunlight-glow)</h2>
      <p>4秒呼吸效果，模拟阳光光斑的脉动。</p>
      <div class="demo-box sunlight-glow" style="background: radial-gradient(circle, #f4d35e, #c77d1f);">
        阳光
      </div>
    </div>
    
    <div class="animation-demo">
      <h2>3. 涟漪扩散动画 (ripple-effect)</h2>
      <p>点击按钮触发0.6秒的一次性涟漪效果。</p>
      <div id="ripple-container" style="position: relative; width: 200px; height: 200px; background: #1c2516; border-radius: 8px;">
        <div id="ripple-target" style="width: 50px; height: 50px; background: #3e6a23; border-radius: 50%; position: absolute; top: 75px; left: 75px;"></div>
      </div>
      <button onclick="triggerRipple()">触发涟漪</button>
    </div>
    
    <div class="animation-demo">
      <h2>4. 悬停生长动画 (gentle-grow)</h2>
      <p>鼠标悬停时元素轻微放大。</p>
      <div class="demo-box gentle-grow-hover" style="background: linear-gradient(135deg, #3e6a23, #2d5016);">
        悬停我
      </div>
    </div>
    
    <div class="animation-demo">
      <h2>5. 页面过渡动画 (page-transition)</h2>
      <p>元素进入时的淡入上移动画。</p>
      <div class="demo-box page-transition" style="background: linear-gradient(135deg, #c77d1f, #daa520);">
        欢迎
      </div>
    </div>
    
    <div class="animation-demo">
      <h2>动画控制</h2>
      <button onclick="toggleAnimations()">暂停/继续所有动画</button>
      <button onclick="location.reload()">重新加载页面</button>
    </div>
  </div>
  
  <script>
    // 涟漪效果触发器
    function triggerRipple() {
      const container = document.getElementById('ripple-container');
      const ripple = document.createElement('div');
      ripple.style.cssText = `
        position: absolute;
        width: 50px;
        height: 50px;
        background: radial-gradient(circle, rgba(244,211,94,0.7) 0%, rgba(244,211,94,0) 70%);
        border-radius: 50%;
        top: 75px;
        left: 75px;
        animation: ripple-effect 0.6s ease-out;
      `;
      container.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }
    
    // 悬停生长效果
    const growBox = document.querySelector('.gentle-grow-hover');
    growBox.addEventListener('mouseenter', function() {
      this.style.animation = 'gentle-grow 0.2s ease-out forwards';
    });
    growBox.addEventListener('mouseleave', function() {
      this.style.animation = 'none';
      setTimeout(() => {
        this.style.animation = '';
      }, 10);
    });
    
    // 动画控制
    function toggleAnimations() {
      const animatedElements = document.querySelectorAll('.leaf-fall, .sunlight-glow, .page-transition');
      animatedElements.forEach(el => {
        if (el.style.animationPlayState === 'paused') {
          el.style.animationPlayState = 'running';
        } else {
          el.style.animationPlayState = 'paused';
        }
      });
    }
    
    // 页面加载时触发页面过渡动画
    document.addEventListener('DOMContentLoaded', function() {
      const pageElements = document.querySelectorAll('.page-transition');
      pageElements.forEach(el => {
        el.style.animation = 'page-transition 0.4s ease-out';
      });
    });
  </script>
</body>
</html>
